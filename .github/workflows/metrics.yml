name: Daily Meta Metrics

on:
  schedule:
    - cron: "0 11 * * *"  # 08:00 Chile, después del catálogo
  workflow_dispatch:
    inputs:
      date_from:
        description: "Fecha inicio (YYYY-MM-DD). Default: ayer"
        required: false
      date_to:
        description: "Fecha fin (YYYY-MM-DD). Default: ayer"
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: ""
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: "1361105058247847"
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT: "quetri"
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
        run: python scripts/meta_metrics.py
