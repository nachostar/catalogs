name: Daily Hereneo Catalog Scraper

on:
  schedule:
    - cron: "0 10 * * *"  # 10:00 UTC = 07:00 Chile (horario invierno)
  workflow_dispatch:       # permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          CHECK_AVAILABILITY_FROM_HTML: "true"
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GCS_BLOB: "hereneo_gmc_catalog.csv"
        run: python scraper_hereneo.py
